<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1A1410" />
    <title>KaziAI</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* Desktop: dark background, centered phone frame */
      body {
        background: #111010;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #root {
        width: 100%;
        height: 100%;
        max-width: 430px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* On desktop (wide screens) show phone chrome */
      @media (min-width: 500px) {
        body {
          background: #0e0d0d;
        }

        #root {
          height: 100vh;
          max-height: 100vh;
          border-radius: 0;
          box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 40px 120px rgba(0,0,0,0.8);
        }
      }

      /* On actual mobile: true full screen */
      @media (max-width: 499px) {
        body {
          background: #1A1410;
        }
        #root {
          height: 100dvh;
          max-width: 100%;
        }
      }

      /* Prevent text size inflation on iOS */
      * { -webkit-text-size-adjust: 100%; }

      /* Smooth scrolling on iOS */
      * { -webkit-overflow-scrolling: touch; }

      /* Hide scrollbars globally */
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
